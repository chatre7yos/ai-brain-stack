name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python-tests:
    name: Python tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Show Python version
        run: python --version

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Smoke test CLI setup and next
        run: |
          tmp="$(mktemp -d)"
          python -m brain.cli --root "$tmp/brain" setup --domain demo --path "$tmp/project" --create-project-dir
          python -m brain.cli --root "$tmp/brain" next
          rm -rf "$tmp"
